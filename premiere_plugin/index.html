<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      color: #e6e6e6;
      background: transparent;
    }
    h1 { font-size: 13px; margin: 0 0 2px; }
    .sub { color: #999; margin: 0 0 10px; font-size: 11px; }
    .row { margin: 6px 0; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    button {
      font-size: 11px;
      padding: 4px 9px;
      background: #333;
      color: #e6e6e6;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #3d3d3d; }
    input[type="text"] {
      font-size: 11px;
      padding: 3px 6px;
      background: #262626;
      color: #e6e6e6;
      border: 1px solid #555;
      border-radius: 4px;
      flex: 1;
      min-width: 90px;
    }
    .hint { color: #888; font-size: 10px; margin: 1px 0 6px; }
    #log {
      margin-top: 10px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 6px;
      height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: monospace;
      font-size: 10px;
      line-height: 1.5;
    }
    .ok { color: #4caf50; }
    .bad { color: #f66; }
  </style>
</head>
<body>
  <h1>ComfyUI &harr; Premiere &mdash; Tier-2 spike round (M0)</h1>
  <p class="sub">v0.8.0 &middot; each button answers one roadmap unknown; results append to the log below.</p>

  <div class="row">
    <button id="spike-a">A: ws:// connect</button>
    <input type="text" id="ws-target" value="localhost:8188" title="host:port of a running ComfyUI">
  </div>
  <p class="hint">THE gate: opens ws://&lt;target&gt;/ws (ComfyUI's own websocket). Proves/refutes cleartext ws on this OS.</p>

  <div class="row">
    <button id="spike-b">B: create bin (lockedAccess)</button>
    <button id="spike-c">C: import + find</button>
    <input type="text" id="import-path" placeholder="/absolute/path/to/a.png" title="file to import for spike C">
  </div>
  <div class="row">
    <button id="spike-d">D: frame-export probe</button>
    <button id="spike-e">E: API probes</button>
    <button id="copy-log">Copy results</button>
    <button id="clear-log">Clear</button>
  </div>

  <div id="log"></div>
  <script src="main.js"></script>
</body>
</html>
